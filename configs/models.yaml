# Classifier hyper-parameters — values preserved from the original pipelines.

# MLP: MLP_KWARGS
mlp:
  epochs: 200
  batch_size: 32
  lr: 0.0006
  patience: 30
  hidden_dims: [192, 96]
  dropout: 0.35
  gamma: 2.0
  weight_decay: 0.0003
  verbose: false

# Logistic Regression (ElasticNet)
logreg:
  C: 1.0
  l1_ratio: 0.5
  max_iter: 5000

# XGBoost + GridSearchCV 
# Falls back to RandomForest automatically if xgboost is not installed.
xgboost:
  n_estimators: 400
  cv: 3
  scoring: f1_weighted
  param_grid:
    max_depth: [3, 5, 7]
    learning_rate: [0.01, 0.1, 0.2]

# SVM (RBF kernel)
svm:
  kernel: rbf
  C: 1.0
  gamma: scale
  probability: true

# NCA-KNN
knn:
  tune: true
  k_grid: [5, 7, 9, 11]
  nca_components_grid: [50]
  nca_components: 50
  nca_max_iter: 100
  nca_tol: 0.00001
  tune_n_inner: 3
  tune_max_iter: 100
